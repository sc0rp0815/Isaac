<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isaac - Personal AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Isaac</h1>
            <p class="subtitle">Persönlicher, vertrauensbasierter KI-Kern</p>
        </header>
        
        <main>
            <div class="chat-window" id="chatWindow"></div>
            
            <div class="input-area">
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="Schreib eine Nachricht..."
                    autocomplete="off"
                >
                <button id="sendBtn" aria-label="Nachricht senden">Senden</button>
            </div>
        </main>
        
        <footer>
            <p>Lokal & Datenschutz-orientiert</p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
